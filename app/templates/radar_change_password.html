<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radar PJ — Trocar Senha</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 40%, rgba(99,102,241,.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 70%, rgba(16,185,129,.10) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 20px;
      padding: 48px 40px 40px;
      backdrop-filter: blur(16px);
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-text { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -.5px; }
    .logo-text span { color: #818cf8; }

    .subtitle { font-size: 13px; color: #64748b; margin-bottom: 8px; }
    .user-tag {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(99,102,241,.15); border: 1px solid rgba(99,102,241,.3);
      border-radius: 20px; padding: 4px 12px; font-size: 12px; color: #818cf8;
      margin-bottom: 28px;
    }

    .field { margin-bottom: 18px; }

    label {
      display: block; font-size: 12px; font-weight: 600;
      color: #94a3b8; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      padding: 12px 16px; font-size: 14px; color: #f1f5f9;
      outline: none; transition: border-color .2s, background .2s;
    }

    input::placeholder { color: #475569; }
    input:focus { border-color: #6366f1; background: rgba(99,102,241,.08); }

    .msg {
      border-radius: 8px; padding: 10px 14px; font-size: 13px;
      margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
    }
    .msg-error { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.25); color: #fca5a5; }
    .msg-success { background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.25); color: #6ee7b7; }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; border: none; border-radius: 10px;
      padding: 13px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: opacity .2s, transform .1s;
      margin-top: 6px;
    }
    .btn:hover { opacity: .9; }
    .btn:active { transform: scale(.98); }

    .btn-ghost {
      display: block; text-align: center; margin-top: 16px;
      font-size: 13px; color: #475569; text-decoration: none;
      transition: color .2s;
    }
    .btn-ghost:hover { color: #818cf8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div class="logo-text">Radar <span>PJ</span></div>
    </div>
    <p class="subtitle">Troca de Senha</p>
    <span class="user-tag">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      {{ radar_username }}
    </span>

    {% if success %}
    <div class="msg msg-success">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      Senha alterada com sucesso!
    </div>
    <a href="/radar" class="btn-ghost">← Voltar ao Radar</a>
    {% else %}
      {% if error %}
      <div class="msg msg-error">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/radar/change-password">
        <div class="field">
          <label>Senha atual</label>
          <input type="password" name="current_password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <div class="field">
          <label>Nova senha</label>
          <input type="password" name="new_password" placeholder="mínimo 6 caracteres" required minlength="6" autocomplete="new-password" />
        </div>
        <div class="field">
          <label>Confirmar nova senha</label>
          <input type="password" name="confirm_password" placeholder="repita a nova senha" required minlength="6" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn">Salvar nova senha</button>
      </form>
      <a href="/radar" class="btn-ghost">← Cancelar e voltar ao Radar</a>
    {% endif %}
  </div>
</body>
</html>
