<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radar PJ — Acesso</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }

    /* Fundo animado */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 40%, rgba(99,102,241,.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 70%, rgba(16,185,129,.10) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 400px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 20px;
      padding: 48px 40px 40px;
      backdrop-filter: blur(16px);
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { width: 22px; height: 22px; }

    .logo-text {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -.5px;
    }

    .logo-text span { color: #818cf8; }

    .subtitle {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 36px;
    }

    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      color: #f1f5f9;
      outline: none;
      transition: border-color .2s, background .2s;
    }

    input::placeholder { color: #475569; }

    input:focus {
      border-color: #6366f1;
      background: rgba(99,102,241,.08);
    }

    .error-msg {
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.25);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #fca5a5;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      margin-top: 6px;
      letter-spacing: .2px;
    }

    .btn:hover { opacity: .9; }
    .btn:active { transform: scale(.98); }

    .footer-note {
      text-align: center;
      font-size: 11.5px;
      color: #334155;
      margin-top: 24px;
    }

    /* Pulse dot */
    .live-dot {
      display: inline-block;
      width: 7px; height: 7px;
      background: #10b981;
      border-radius: 50%;
      margin-right: 5px;
      animation: pulse 2s infinite;
      vertical-align: middle;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(16,185,129,.5); }
      50%      { box-shadow: 0 0 0 5px rgba(16,185,129,0); }
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
      </div>
      <div class="logo-text">Radar <span>PJ</span></div>
    </div>
    <p class="subtitle"><span class="live-dot"></span>Monitoramento em tempo real · Treinamentos Corporativos</p>

    {% if error %}
    <div class="error-msg">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="">
      <div class="field">
        <label>Usuário</label>
        <input type="text" name="username" placeholder="seu usuário" autocomplete="username" required autofocus />
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn">Entrar no Radar</button>
    </form>

    <p class="footer-note">Acesso restrito à equipe autorizada</p>
  </div>
</body>
</html>
