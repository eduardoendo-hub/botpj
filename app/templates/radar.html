<html lang="pt-BR">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #060c18; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #f1f5f9; }
  #root { min-height: 100vh; }

  @keyframes slideIn { from { transform: translateX(100%) } to { transform: translateX(0) } }
  .slide-in { animation: slideIn .22s cubic-bezier(.16,1,.3,1); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .pulse { animation: pulse 2s cubic-bezier(.4,0,.6,1) infinite; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: rgba(15,23,42,.4); }
  ::-webkit-scrollbar-thumb { background: rgba(148,163,184,.2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,.35); }

  .truncate { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* chat bubbles */
  .bubble-bot   { background: rgba(30,44,70,.95);   border: 1px solid rgba(148,163,184,.2); color: #e2e8f0; border-radius: 4px 14px 14px 14px; }
  .bubble-user  { background: rgba(99,102,241,.32); border: 1px solid rgba(129,140,248,.45);  color: #e0e7ff; border-radius: 14px 4px 14px 14px; }
  .bubble-agent { background: rgba(14,165,233,.22); border: 1px solid rgba(56,189,248,.35); color: #bae6fd; border-radius: 4px 14px 14px 14px; }

  /* tabela linhas */
  .tr-hover:hover { background: rgba(99,102,241,.1) !important; }
  .tr-sel         { background: rgba(99,102,241,.2) !important; }
  .tr-sla         { background: rgba(239,68,68,.09); }
</style>
</head>

const Icon = ({ name, size = 16, style = {} }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
    style={{display:"inline-block", verticalAlign:"middle", flexShrink:0, ...style}}
    dangerouslySetInnerHTML={{ __html: ICON_PATHS[name] || ICON_PATHS["help-circle"] }}
  />
);

// ── Date helpers (BRT = UTC-3) ─────────────────────────────────────────────────
const todayBRT = () => {
  const d = new Date(Date.now() - 3 * 60 * 60 * 1000);
  return d.toISOString().split("T")[0];
};
const yesterdayBRT = () => {
  const d = new Date(Date.now() - 3 * 60 * 60 * 1000 - 86400 * 1000);
  return d.toISOString().split("T")[0];
};
const formatDateLabel = (iso) => {
  const t = todayBRT(), y = yesterdayBRT();
  if (iso === t) return "Hoje";
  if (iso === y) return "Ontem";
  const [yr, m, d] = iso.split("-");
  return `${d}/${m}/${yr}`;
};
const stepIso = (iso, delta) => {
  const [y, m, d] = iso.split("-").map(Number);
  const dt = new Date(y, m - 1, d + delta);
  return [dt.getFullYear(), String(dt.getMonth()+1).padStart(2,"0"), String(dt.getDate()).padStart(2,"0")].join("-");
};

// ── DateNav ────────────────────────────────────────────────────────────────────
const DateNav = ({ dateFilter, setDateFilter, availableDates }) => {
  const today = todayBRT(), isToday = dateFilter === today;
  const go = (d) => { const n = stepIso(dateFilter, d); if (n <= today) setDateFilter(n); };
  const btn = (onClick, disabled, children, title) => (
    <button onClick={onClick} disabled={disabled} title={title} style={{
      padding:"4px 6px", borderRadius:6, background:"transparent", border:"none",
      color: disabled ? C.txt3 : C.txt2, cursor: disabled ? "not-allowed" : "pointer",
      display:"flex",alignItems:"center",
    }}
    onMouseEnter={e=>{ if(!disabled) e.currentTarget.style.background="rgba(148,163,184,.1)"; }}
    onMouseLeave={e=>{ e.currentTarget.style.background="transparent"; }}>
      {children}
    </button>
  );
  return (
    <div style={{
      display:"flex", alignItems:"center", gap:2,
      background:C.cardBg, border:`1px solid ${C.border}`,
      borderRadius:10, padding:"4px 8px",
    }}>
      {btn(() => go(-1), false, <Icon name="chevron-left" size={14} />, "Dia anterior")}
      <div style={{display:"flex",alignItems:"center",gap:6,minWidth:80,justifyContent:"center",padding:"0 4px"}}>
        <Icon name="calendar" size={12} style={{color:"#6366f1"}} />
        <span style={{fontSize:13,fontWeight:600,color:C.txt1,whiteSpace:"nowrap"}}>{formatDateLabel(dateFilter)}</span>
      </div>
      {btn(() => go(1), isToday, <Icon name="chevron-right" size={14} />, "Próximo dia")}

      {!isToday && (
        <button onClick={() => setDateFilter(today)} style={{
          marginLeft:4, fontSize:11, fontWeight:600, color:"#818cf8",
          background:"rgba(99,102,241,.15)", border:"1px solid rgba(99,102,241,.25)",
          borderRadius:999, padding:"2px 8px", cursor:"pointer",
        }}>Hoje</button>
      )}
      {isToday && (
        <button onClick={() => setDateFilter(yesterdayBRT())} style={{
          marginLeft:4, fontSize:11, color:C.txt2,
          background:"rgba(148,163,184,.08)", border:`1px solid ${C.border}`,
          borderRadius:999, padding:"2px 8px", cursor:"pointer",
        }}>Ontem</button>
      )}
      {availableDates.length > 2 && (
        <select value={dateFilter} onChange={e => setDateFilter(e.target.value)} style={{
          marginLeft:4, fontSize:11, border:`1px solid ${C.border}`,
          borderRadius:6, padding:"3px 4px", color:C.txt2,
          background:"rgba(30,41,59,.8)", cursor:"pointer", maxWidth:80,
        }}>
          {availableDates.map(d => <option key={d} value={d}>{formatDateLabel(d)}</option>)}
          {!availableDates.includes(dateFilter) && (
            <option value={dateFilter}>{formatDateLabel(dateFilter)}</option>
          )}
        </select>
      )}
    </div>
  );
};

// ── Helpers para data legível ──────────────────────────────────────────────────
const _parseDate = (iso) => {
  if (!iso) return null;
  // Normaliza: substitui espaço por T, garante segundos
  let s = String(iso).replace(" ", "T");
  if (/T\d{2}:\d{2}$/.test(s)) s += ":00";
  const d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
};
const fmtDateTimeBRT = (iso) => {
  const d = _parseDate(iso);
  if (!d) return iso || "—";
  return d.toLocaleString("pt-BR", {
    timeZone:"America/Sao_Paulo",
    day:"2-digit", month:"2-digit", year:"numeric",
    hour:"2-digit", minute:"2-digit",
  });
};
const fmtDateBRT = (iso) => {
  const d = _parseDate(iso);
  if (!d) return iso || "—";
  return d.toLocaleDateString("pt-BR", { timeZone:"America/Sao_Paulo", day:"2-digit", month:"2-digit", year:"numeric" });
};
const taskTypeLabel = (t) => ({
  email: "E-mail", call: "Ligação", meeting: "Reunião", task: "Tarefa", whatsapp: "WhatsApp",
}[t] || t || "Atividade");
const taskTypeColor = (t) => ({
  email: "#60a5fa", call: "#34d399", meeting: "#a78bfa", whatsapp: "#4ade80", task: "#fb923c",
}[t] || "#94a3b8");
const taskTypeIcon = (t) => ({
  email: "message-square", call: "phone-call", meeting: "users", whatsapp: "message-square",
}[t] || "check-circle");

// ── Renderiza lista de atividades (tarefas + anotações) ───────────────────────

          const isNote   = item._kind === "note";
          const color    = isNote ? "#94a3b8" : taskTypeColor(item.ttype);
          const borderC  = item.done ? "rgba(148,163,184,.15)" : "rgba(245,158,11,.25)";
          const bgC      = isNote   ? "rgba(15,23,42,.6)"
                         : item.done ? "rgba(30,41,59,.5)"
                         : "rgba(245,158,11,.05)";

          return (
            <div key={i} style={{background:bgC,border:`1px solid ${borderC}`,borderRadius:10,padding:"12px 14px"}}>

                      background:"rgba(99,102,241,.15)",color:"#818cf8",border:"1px solid rgba(99,102,241,.25)"}}>
                      📋 Registro
                    </span>
                  ) : item.ttype ? (
                    <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:99,
                      background:`${color}22`,color,border:`1px solid ${color}44`,whiteSpace:"nowrap"}}>
                      <Icon name={taskTypeIcon(item.ttype)} size={9} style={{marginRight:3}} />
                      {taskTypeLabel(item.ttype)}

                  {!isNote && (item.done

                  )}
                </div>
                {item.dateStr && (
                  <span style={{fontSize:10,color:"#64748b",whiteSpace:"nowrap",flexShrink:0}}>
                    {fmtDateTimeBRT(item.dateStr)}
                  </span>
                )}
              </div>

              {/* Título (para task) ou texto direto (para activity) */}
              {item.ttype !== "activity" && (
                <div style={{fontSize:13,fontWeight:600,color:item.done?"#cbd5e1":"#f1f5f9",lineHeight:1.4,marginBottom:item.desc?8:0}}>
                  {item.subject}
                </div>
              )}

              {/* Corpo / texto completo */}
              {item.desc && (
                <div style={{
                  fontSize:12,color:"#cbd5e1",lineHeight:1.7,
                  whiteSpace:"pre-wrap",wordBreak:"break-word",
                  borderTop: item.ttype !== "activity" ? "1px solid rgba(255,255,255,.06)" : "none",
                  paddingTop: item.ttype !== "activity" ? 8 : 0,
                }}>
                  {item.desc}

              {/* Responsável */}
              {item.who && (
                <div style={{fontSize:11,color:"#64748b",marginTop:6,display:"flex",alignItems:"center",gap:4}}>
                  <Icon name="user" size={10} />{item.who}

      </div>
    </div>

};

// ── Drawer com abas (Detalhes / Conversa / Histórico) ─────────────────────────
const Drawer = ({ lead, onClose, basePath }) => {
  const [tab, setTab]           = useState("info");
  const [msgs, setMsgs]         = useState(null);   // null = não carregado
  const [loadingMsgs, setLM]    = useState(false);
  const [crm, setCrm]           = useState(null);   // dados CRM completos
  const [loadingCrm, setLC]     = useState(false);
  const [companyIntel, setCI]   = useState(null);   // intel da empresa
  const [loadingCI, setLCI]     = useState(false);
  const chatEndRef               = useRef(null);

  // Fecha ao trocar de lead
  useEffect(() => { setTab("info"); setMsgs(null); setCrm(null); setCI(null); }, [lead?.id]);

  const loadChat = useCallback(async () => {
    if (msgs !== null || loadingMsgs) return;
    setLM(true);
    try {
      const res  = await fetch(`${basePath}/conversation/${encodeURIComponent(lead.telefone)}`);
      const json = await res.json();
      setMsgs(json.messages || []);
    } catch(e) { setMsgs([]); }
    finally    { setLM(false); }
  }, [msgs, loadingMsgs, lead, basePath]);

  const loadCrm = useCallback(async () => {
    if (crm !== null || loadingCrm) return;
    setLC(true);
    try {
      const res  = await fetch(`${basePath}/crm/${encodeURIComponent(lead.telefone)}`);
      const json = await res.json();
      setCrm(json);
    } catch(e) { setCrm({}); }
    finally    { setLC(false); }
  }, [crm, loadingCrm, lead, basePath]);

  const loadCompanyIntel = useCallback(async () => {
    if (companyIntel !== null || loadingCI) return;
    if (!lead.empresa || lead.empresa === "—") { setCI({}); return; }
    setLCI(true);
    try {
      const res  = await fetch(`${basePath}/company-intel/${encodeURIComponent(lead.telefone)}`);
      const data = await res.json();
      setCI(data);
    } catch(e) { setCI({}); }
    finally    { setLCI(false); }
  }, [companyIntel, loadingCI, lead, basePath]);

    if (tab === "chat")    { loadChat(); }
    if (tab === "history") { loadCrm();  }
    if (tab === "info")    { loadCompanyIntel(); }

  useEffect(() => { loadCompanyIntel(); }, [lead?.id]);

        position:"relative", width:"100%", maxWidth:440,
        background:"#0d1526", borderLeft:`1px solid ${C.border}`,

        {/* Header do drawer */}
        <div style={{
          padding:"16px 20px", borderBottom:`1px solid ${C.border}`,

            </div>
            <button onClick={onClose} style={{

              cursor:"pointer", padding:"4px 6px", borderRadius:6,

              <Icon name="x" size={17} />

                    {/* Estado vazio */}
                    {!loadingCI && companyIntel && typeof companyIntel === "object" && !companyIntel.descricao && !companyIntel.funcionarios && !companyIntel.setor && (
                      <p style={{margin:0,fontSize:12,color:C.txt3,fontStyle:"italic"}}>
                        Nenhuma informação encontrada para esta empresa.
                      </p>
                    )}
                  </div>
                </div>
              )}

            </div>
          )}

          {/* ─── Aba Conversa ─── */}
          {tab === "chat" && (
            <div style={{display:"flex",flexDirection:"column",minHeight:"100%"}}>
              {loadingMsgs && (
                <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:40,color:C.txt3,fontSize:13}}>
                  Carregando conversa…
                </div>
              )}
              {!loadingMsgs && msgs && msgs.length === 0 && (
                <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:40}}>
                  <Icon name="message-square" size={32} style={{color:C.txt3,marginBottom:8}} />
                  <p style={{color:C.txt3,fontSize:13,margin:0}}>Nenhuma mensagem registrada.</p>
                </div>
              )}
              {!loadingMsgs && msgs && msgs.length > 0 && (
                <div style={{padding:"16px 12px",display:"flex",flexDirection:"column",gap:8}}>
                  {msgs.map((m, i) => {
                    const isUser = m.role === "user";
                    const isAgent = m.role === "agent";
                    return (
                      <div key={i} style={{display:"flex",flexDirection:"column",alignItems: isUser?"flex-end":"flex-start"}}>
                        <div style={{fontSize:10,color:C.txt3,marginBottom:3,paddingLeft:isUser?0:4,paddingRight:isUser?4:0}}>
                          {isAgent ? "👤 " : ""}{isAgent && m.operator_name ? m.operator_name : roleLabel(m.role)} · {m.hora}
                        </div>
                        <div className={bubbleCls(m.role)} style={{
                          maxWidth:"88%", padding:"8px 12px",
                          fontSize:13, lineHeight:1.5,
                          whiteSpace:"pre-wrap", wordBreak:"break-word",
                        }}>
                          {m.message}
                        </div>
                      </div>
                    );
                  })}
                  <div ref={chatEndRef} />
                </div>
              )}
            </div>
          )}

          {/* ─── Aba Histórico CRM ─── */}
          {tab === "history" && (
            <div style={{display:"flex",flexDirection:"column",gap:16}}>
              {loadingCrm && (
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:40,color:C.txt3,fontSize:13}}>
                  Buscando dados no CRM…
                </div>
              )}
              {!loadingCrm && crm && Object.keys(crm).length === 0 && (
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:40}}>
                  <Icon name="trending-up" size={32} style={{color:C.txt3,marginBottom:8}} />
                  <p style={{color:C.txt3,fontSize:13,margin:0}}>Nenhum deal encontrado no CRM.</p>
                </div>
              )}
              {!loadingCrm && crm && crm.etapa && (<>

                {/* ── Pipeline + Negociação + Etapa atual ── */}
                <div style={{background:"rgba(99,102,241,.08)",border:"1px solid rgba(99,102,241,.2)",borderRadius:12,padding:"14px 16px"}}>
                  {crm.pipeline && (
                    <div style={{fontSize:10,fontWeight:700,color:"#818cf8",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>
                      {crm.pipeline}
                    </div>
                  )}
                  {crm.deal_name && (
                    <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",marginBottom:8,lineHeight:1.3}}>
                      {crm.deal_name}
                    </div>
                  )}
                  <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                    <FunilPill etapa={crm.etapa} consultor={crm.consultor} />
                    {crm.valor > 0 && (
                      <span style={{fontSize:14,fontWeight:700,color:"#34d399"}}>{fmtBRL(crm.valor)}</span>
                    )}
                  </div>
                </div>

                {/* ── Progresso no Funil ── */}
                {crm.stage_histories && crm.stage_histories.length > 0 && (
                  <div>
                    <div style={{fontSize:10,fontWeight:700,color:C.txt3,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>
                      Progresso no Funil
                    </div>
                    <div style={{position:"relative",paddingLeft:20}}>
                      <div style={{position:"absolute",left:7,top:6,bottom:6,width:2,background:"rgba(99,102,241,.25)",borderRadius:1}} />
                      {crm.stage_histories.map((h, i) => {
                        const isLast = i === crm.stage_histories.length - 1;
                        return (
                          <div key={i} style={{position:"relative",paddingBottom:isLast?0:12}}>
                            <div style={{
                              position:"absolute",left:-20,top:4,
                              width:10,height:10,borderRadius:"50%",
                              background: isLast ? "#818cf8" : "rgba(99,102,241,.35)",
                              border: `2px solid ${isLast ? "#6366f1" : "rgba(99,102,241,.2)"}`,
                              zIndex:1,
                            }} />
                            <div style={{background:"rgba(30,41,59,.6)",borderRadius:8,padding:"8px 10px"}}>
                              <div style={{fontSize:12,fontWeight:600,color:isLast?C.txt1:C.txt2}}>{h.stage_name}</div>
                              <div style={{fontSize:10,color:C.txt3,marginTop:2}}>
                                {h.start_date ? fmtDateBRT(h.start_date) : "—"}
                                {h.end_date ? ` → ${fmtDateBRT(h.end_date)}` : h.start_date ? " → atual" : ""}
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* ── Timeline de atividades (/activities) + fallback next/prev_task ── */}
                {(() => {
                  // /activities retorna {_id, date, text, user_id}
                  const activities = (crm.all_activities || []).map(a => ({
                    _kind:   "activity",
                    done:    true,
                    dateStr: a.date || "",
                    subject: "Atividade",   // /activities não tem subject próprio
                    desc:    a.text || "",
                    who:     "",            // user_id só, sem nome — omite
                    ttype:   "activity",
                  }));

                  // Fallback: next_task + previous_task do objeto do deal
                  const taskItems = [];
                  if (crm.previous_task) taskItems.push({
                    _kind:   "task", done: true,
                    dateStr: crm.previous_task.done_date || crm.previous_task.date || "",
                    subject: crm.previous_task.subject || crm.previous_task.name || "Tarefa",
                    desc:    crm.previous_task.description || "",
                    who:     crm.previous_task.done_by?.name || "",
                    ttype:   crm.previous_task.type || "task",
                  });
                  if (crm.next_task) taskItems.push({
                    _kind:   "task", done: false,
                    dateStr: crm.next_task.date || crm.next_task.due_date || "",
                    subject: crm.next_task.subject || crm.next_task.name || "Tarefa",
                    desc:    crm.next_task.description || "",
                    who:     crm.next_task.assigned_to?.name || "",
                    ttype:   crm.next_task.type || "task",
                  });

                  // Junta tudo e ordena por data desc
                  const all = [...taskItems, ...activities].sort((a,b) => {
                    if (!a.dateStr && !b.dateStr) return 0;
                    if (!a.dateStr) return 1;
                    if (!b.dateStr) return -1;
                    return b.dateStr.localeCompare(a.dateStr);
                  });

                  if (!all.length) return null;
                  return renderActivityList(all);
                })()}

              </>)}
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ── Radar principal ────────────────────────────────────────────────────────────
function Radar() {
  const [leads, setLeads]                   = useState([]);
  const [loading, setLoading]               = useState(true);
  const [search, setSearch]                 = useState("");
  const [selected, setSelected]             = useState(null);
  const [sortCol, setSortCol]               = useState("hora");
  const [sortDir, setSortDir]               = useState("desc");
  const [filters, setFilters]               = useState({ temp:"", quem:"", score:"" });
  const [lastUpd, setLastUpd]               = useState(null);
  const [dateFilter, setDateFilter]         = useState(() => todayBRT());
  const [availableDates, setAvailableDates] = useState([]);

  const basePath = window.location.pathname.replace(/\/+$/, "");

  // silent=true → refresh em background sem mostrar loading (evita piscar)
  const fetchData = useCallback(async (date, silent = false) => {
    if (!silent) setLoading(true);
    try {
      const res  = await fetch(`${basePath}/data?date=${date}`);
      const json = await res.json();
      setLeads(json.leads || []);
      if (json.available_dates?.length) setAvailableDates(json.available_dates);
      setLastUpd(new Date().toLocaleTimeString("pt-BR", {hour:"2-digit",minute:"2-digit"}));
    } catch(e) { console.error(e); }
    finally    { if (!silent) setLoading(false); }
  }, [basePath]);

  useEffect(() => {
    fetchData(dateFilter);
    if (dateFilter !== todayBRT()) return;
    // Auto-refresh a cada 2 minutos em background (sem piscar)
    const id = setInterval(() => fetchData(dateFilter, true), 120000);
    return () => clearInterval(id);
  }, [dateFilter, fetchData]);

  const changeDate = (d) => {
    setDateFilter(d);
    setFilters({ temp:"", quem:"", score:"" });
    setSearch(""); setSelected(null);
  };

  const kpis = useMemo(() => ({
    total:       leads.length,
    quentes:     leads.filter(l => l.temp==="quente").length,
    bot:         leads.filter(l => l.quem==="bot").length,
    transferido: leads.filter(l => l.quem==="transferido").length,
    humano:      leads.filter(l => l.quem==="consultor").length,
    vermelho:    leads.filter(l => l.farol==="VERMELHO").length,
    amarelo:     leads.filter(l => l.farol==="AMARELO").length,
    qualificado: leads.filter(l => l.status==="Qualificado").length,
    locacao:     leads.filter(l => l.tipo==="Locação").length,
  }), [leads]);

  const handleSort = (col) => {
    if (sortCol === col) setSortDir(d => d==="asc"?"desc":"asc");
    else { setSortCol(col); setSortDir("desc"); }
  };

  const setFilter = (key, val) => setFilters(f => ({ ...f, [key]: f[key]===val?"":val }));

  const filtered = useMemo(() => {
    let data = [...leads];
    if (search) {
      const q = search.toLowerCase();
      data = data.filter(l =>
        (l.nome||"").toLowerCase().includes(q) ||
        (l.empresa||"").toLowerCase().includes(q) ||
        (l.telefone||"").includes(q)
      );
    }
    if (filters.temp)               data = data.filter(l => l.temp===filters.temp);
    if (filters.quem)               data = data.filter(l => l.quem===filters.quem);
    if (filters.score==="alto")     data = data.filter(l => l.score>=70);
    if (filters.score==="baixo")    data = data.filter(l => l.score<50);
    return [...data].sort((a,b) => {
      let av = a[sortCol]??"", bv = b[sortCol]??"";
      if (typeof av==="string") { av=av.toLowerCase(); bv=bv.toLowerCase(); }
      if (av<bv) return sortDir==="asc"?-1:1;
      if (av>bv) return sortDir==="asc"?1:-1;
      return 0;
    });
  }, [leads, search, filters, sortCol, sortDir]);

  const activeFilters = Object.values(filters).filter(Boolean).length;
  const isToday       = dateFilter === todayBRT();

  // ── Estilos reutilizáveis ──
  const card = { background:C.cardBg, border:`1px solid ${C.border}`, borderRadius:12 };
  const thStyle = { padding:"10px 12px", fontSize:11, fontWeight:700, color:C.txt3,
    textTransform:"uppercase", letterSpacing:".5px", whiteSpace:"nowrap",
    userSelect:"none", textAlign:"left", cursor:"pointer" };
  const tdStyle = { padding:"10px 12px", fontSize:12 };

  const SortIcon = ({ col }) => {
    if (sortCol !== col) return <Icon name="chevron-down" size={10} style={{color:C.txt3,marginLeft:2}} />;
    return <Icon name={sortDir==="asc"?"chevron-up":"chevron-down"} size={10} style={{color:"#6366f1",marginLeft:2}} />;
  };

  const Th = ({ col, children }) => (
    <th style={thStyle} onClick={() => col && handleSort(col)}>
      <span style={{display:"flex",alignItems:"center"}}>
        {children}
        {col && <SortIcon col={col} />}
      </span>
    </th>
  );

  // ── Botão de filtro ──
  const FilterBtn = ({ active, onClick, children }) => (
    <button onClick={onClick} style={{
      display:"flex", alignItems:"center", gap:4,
      padding:"4px 10px", borderRadius:8,
      fontSize:11, fontWeight:600, cursor:"pointer",
      border: active ? "1px solid rgba(99,102,241,.4)" : `1px solid ${C.border}`,
      background: active ? "rgba(99,102,241,.18)" : "transparent",
      color: active ? "#818cf8" : C.txt2,
      transition:"all .15s",
    }}>
      {children}
    </button>
  );

  return (
    <div style={{minHeight:"100vh", background:C.pageBg}}>

      {/* ── Header ── */}
      <header style={{
        background: C.headerBg, borderBottom:`1px solid ${C.border}`,
        padding:"14px 24px", position:"sticky", top:0, zIndex:30,
        backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)",
      }}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:28,height:28,background:"#6366f1",borderRadius:8,
                display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 0 12px rgba(99,102,241,.4)"}}>
                <Icon name="bar-chart-2" size={14} style={{color:"#fff"}} />
              </div>
              <span style={{fontSize:17,fontWeight:800,color:C.txt1,letterSpacing:"-.3px"}}>Radar</span>
              {isToday ? (
                <span style={{display:"flex",alignItems:"center",gap:5,
                  background:"rgba(16,185,129,.12)",color:"#34d399",
                  fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:999,
                  border:"1px solid rgba(16,185,129,.25)"}}>
                  <span className="pulse" style={{width:6,height:6,borderRadius:"50%",background:"#34d399",display:"inline-block"}} />
                  Ao Vivo
                </span>
              ) : (
                <span style={{display:"flex",alignItems:"center",gap:5,
                  background:"rgba(100,116,139,.12)",color:C.txt2,
                  fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:999,
                  border:`1px solid ${C.border}`}}>
                  <Icon name="calendar" size={10} /> Histórico
                </span>
              )}
            </div>
            <p style={{fontSize:11,color:C.txt3,marginTop:3,marginLeft:36}}>
              Monitoramento em tempo real · Leads PJ · Treinamentos Corporativos
            </p>
          </div>

          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            {lastUpd && <span style={{fontSize:11,color:C.txt3}}>Atualizado {lastUpd}</span>}

            <DateNav dateFilter={dateFilter} setDateFilter={changeDate} availableDates={availableDates} />

            {/* Busca */}
            <div style={{position:"relative"}}>
              <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",color:C.txt3,pointerEvents:"none"}}>
                <Icon name="search" size={13} />
              </span>
              <input value={search} onChange={e=>setSearch(e.target.value)}
                placeholder="Nome, empresa, telefone…"
                style={{
                  paddingLeft:28, paddingRight:10, paddingTop:7, paddingBottom:7,
                  fontSize:12, border:`1px solid ${C.border}`, borderRadius:8,
                  background:C.inputBg, color:C.txt1, outline:"none", width:190,
                }}
                onFocus={e=>e.target.style.borderColor="#6366f1"}
                onBlur={e=>e.target.style.borderColor=C.border}
              />
            </div>

            {isToday && (
              <button onClick={() => fetchData(dateFilter)} style={{
                display:"flex", alignItems:"center", gap:5,
                fontSize:11, fontWeight:700, color:"#818cf8",
                background:"rgba(99,102,241,.15)", border:"1px solid rgba(99,102,241,.3)",
                padding:"6px 12px", borderRadius:8, cursor:"pointer",
              }}>
                <Icon name="refresh-cw" size={12} /> Atualizar
              </button>
            )}

            <a href={basePath.replace(/\/radar.*$/, "/admin")} style={{
              display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.txt2,
              background:"rgba(148,163,184,.07)",border:`1px solid ${C.border}`,
              padding:"6px 12px",borderRadius:8,textDecoration:"none",
            }}>
              <Icon name="settings" size={12} /> Admin
            </a>
            <a href={basePath.replace(/\/radar.*$/, "/radar/logout")} style={{
              display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.txt2,
              background:"rgba(148,163,184,.07)",border:`1px solid ${C.border}`,
              padding:"6px 12px",borderRadius:8,textDecoration:"none",
            }}>
              <Icon name="log-out" size={12} /> Sair
            </a>
          </div>
        </div>
      </header>

      <div style={{padding:"20px 24px",display:"flex",flexDirection:"column",gap:14}}>

        {/* ── KPIs ── */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:10}}>
          <KpiCard iconName="users"          label={isToday?"Leads hoje":"Total do dia"} value={kpis.total}       color="#818cf8" />
          <KpiCard iconName="flame"          label="Quentes"       value={kpis.quentes}     color="#f87171" />
          <KpiCard iconName="bot"            label="Com o bot"     value={kpis.bot}         color="#a78bfa" />
          <KpiCard iconName="arrow-up-right" label="Transferidos"  value={kpis.transferido} color="#fb923c" />
          <KpiCard iconName="phone-call"     label="Com consultor" value={kpis.humano}      color="#60a5fa" />
          <KpiCard iconName="alert-circle"   label="Farol Vermelho" value={kpis.vermelho}    urgent={isToday && kpis.vermelho>0} />
          <KpiCard iconName="check-circle"   label="Qualificados"  value={kpis.qualificado} color="#34d399" />
          <KpiCard iconName="building-2"     label="Locação"       value={kpis.locacao}     color="#2dd4bf" />
        </div>

        {/* ── Filtros ── */}
        <div style={{...card, padding:"10px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.txt3,fontWeight:600}}>
              <Icon name="filter" size={12} /> Filtros
              {activeFilters > 0 && (
                <span style={{background:"#6366f1",color:"#fff",borderRadius:"50%",
                  width:16,height:16,display:"inline-flex",alignItems:"center",
                  justifyContent:"center",fontSize:10,fontWeight:700}}>{activeFilters}</span>
              )}
            </span>
            <div style={{width:1,height:16,background:C.border}} />

            {["quente","morno","frio"].map(t => {
              const cfg = getTempConfig(t);
              return (
                <FilterBtn key={t} active={filters.temp===t} onClick={()=>setFilter("temp",t)}>
                  <Icon name={cfg.icon} size={10} style={{color:filters.temp===t?cfg.color:"inherit"}} />
                  {cfg.label}
                </FilterBtn>
              );
            })}

            <div style={{width:1,height:16,background:C.border}} />
            {[["bot","Bot"],["transferido","Transferido"],["consultor","Consultor"]].map(([v,l]) => (
              <FilterBtn key={v} active={filters.quem===v} onClick={()=>setFilter("quem",v)}>{l}</FilterBtn>
            ))}

            <div style={{width:1,height:16,background:C.border}} />
            {[["alto","Score 70+"],["baixo","Score <50"]].map(([v,l]) => (
              <FilterBtn key={v} active={filters.score===v} onClick={()=>setFilter("score",v)}>{l}</FilterBtn>
            ))}

            {activeFilters > 0 && (
              <button onClick={()=>setFilters({temp:"",quem:"",score:""})} style={{
                marginLeft:"auto", display:"flex", alignItems:"center", gap:4,
                fontSize:11, color:C.txt3, background:"transparent", border:"none", cursor:"pointer",
              }}>
                <Icon name="x" size={11} /> Limpar

        {/* ── Tabela ── */}

          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",borderBottom:`1px solid ${C.borderSm}`}}>
            <span style={{fontSize:13,fontWeight:600,color:C.txt1}}>
              {loading ? "Carregando…" : `${filtered.length} lead${filtered.length!==1?"s":""}`}
              {!loading && activeFilters>0 && <span style={{color:C.txt3,fontWeight:400}}> filtrados</span>}
            </span>
            <span style={{fontSize:11,color:C.txt3}}>Clique para ver detalhes e conversa</span>
          </div>

          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead>
                <tr style={{borderBottom:`1px solid ${C.borderSm}`}}>
                  <Th col="hora">Hora</Th>
                  <Th>Nome / Empresa</Th>
                  <Th>Telefone</Th>
                  <Th>Produto</Th>
                  <Th col="funil">Funil</Th>
                  <Th col="crm_valor">$</Th>

                  <Th>Próximo Passo</Th>
                  <Th col="quem">Quem</Th>
                  <Th col="farol">Farol</Th>
                </tr>
              </thead>
              <tbody>
                {loading ? (
                  <tr><td colSpan={12} style={{...tdStyle,textAlign:"center",padding:"56px 0",color:C.txt3}}>Carregando leads…</td></tr>

                  <tr><td colSpan={12} style={{...tdStyle,textAlign:"center",padding:"56px 0"}}>

                  return (
                    <tr key={lead.id}
                      className={`tr-hover ${isSel?"tr-sel":""} ${isToday&&lead.farol==="VERMELHO"?"tr-sla":""}`}
                      onClick={() => setSelected(isSel ? null : lead)}
                      style={{cursor:"pointer",borderBottom:`1px solid ${C.borderSm}`,transition:"background .12s"}}>
                      <td style={tdStyle}>
                        <span style={{fontFamily:"monospace",fontSize:11,color:C.txt2,
                          background:"rgba(30,41,59,.7)",padding:"2px 6px",borderRadius:4}}>
                          {lead.hora}
                        </span>
                      </td>
                      <td style={{...tdStyle, minWidth:160}}>
                        <div className="truncate" title={lead.nome}
                          style={{fontWeight:600,color:C.txt1,fontSize:13,maxWidth:150}}>{lead.nome}</div>
                        <div className="truncate" title={lead.empresa}
                          style={{fontSize:11,color:C.txt3,marginTop:1,display:"flex",alignItems:"center",gap:3,maxWidth:150}}>
                          <Icon name="building-2" size={10} />{lead.empresa}
                        </div>
                      </td>
                      <td style={tdStyle}>
                        <span style={{fontFamily:"monospace",fontSize:11,color:C.txt3}}>{lead.telefone}</span>
                      </td>
                      <td style={{...tdStyle, maxWidth:180}}>
                        <span className="truncate" title={lead.produto}
                          style={{fontSize:12,color:C.txt1,fontWeight:600,display:"block"}}>
                          {lead.produto || "A definir"}
                        </span>
                      </td>
                      <td style={tdStyle}>
                        <FunilPill etapa={lead.funil} consultor={lead.crm_consultor} />
                      </td>
                      <td style={tdStyle}>
                        <span style={{fontSize:12, fontWeight:700, color: lead.crm_valor > 0 ? "#34d399" : "#475569", fontVariantNumeric:"tabular-nums", whiteSpace:"nowrap"}}>
                          {fmtBRL(lead.crm_valor)}
                        </span>
                      </td>
                      <td style={{...tdStyle, whiteSpace:"nowrap"}}>
                        <Pill bg={sSt.bg} color={sSt.color}>{lead.status}</Pill>
                      </td>
                      <td style={{...tdStyle, maxWidth:160}}>
                        <span className="truncate" title={lead.proximo_passo}
                          style={{fontSize:11,color:C.txt3,display:"block"}}>{lead.proximo_passo}</span>
                      </td>
                      <td style={tdStyle}><QuemIcon quem={lead.quem} /></td>
                      <td style={{...tdStyle, textAlign:"center"}}>
                        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}
                          title={lead.farol_motivo || ""}>
                          {/* Semáforo circular */}
                          <div style={{
                            width:16, height:16, borderRadius:"50%",
                            background: frl.color,
                            boxShadow: lead.farol!=="?" ? `0 0 7px ${frl.glow}` : "none",
                            flexShrink:0,
                          }} />
                          {/* Badge urgência */}
                          {(() => {
                            const uc = urgenciaConfig(lead.farol_urgencia);
                            if (!uc || lead.farol_urgencia === "BAIXA") return null;
                            return (
                              <span style={{fontSize:9,fontWeight:700,color:uc.color,letterSpacing:.3,lineHeight:1}}>
                                {uc.label}
                              </span>
                            );
                          })()}
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {!loading && filtered.length > 0 && (
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              padding:"8px 16px",borderTop:`1px solid ${C.borderSm}`}}>
              <span style={{fontSize:11,color:C.txt3}}>
                {isToday ? "Auto-atualiza a cada 30s" : `Dados de ${formatDateLabel(dateFilter)}`}
              </span>
              <span style={{fontSize:11,color:C.txt3}}>
                {filtered.filter(l=>l.temp==="quente").length} quentes ·{" "}
                {isToday
                  ? `${filtered.filter(l=>l.farol==="VERMELHO").length} farol vermelho · ${filtered.filter(l=>l.farol==="AMARELO").length} amarelo`
                  : `${filtered.filter(l=>l.status==="Qualificado").length} qualificados`}
              </span>
            </div>
          )}
        </div>
      </div>

      {selected && <Drawer lead={selected} onClose={()=>setSelected(null)} basePath={basePath} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Radar />);
{% endraw %}
</script>
</body>
</html>
