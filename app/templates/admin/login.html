<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bot SDR PJ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
               background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { background: #fff; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px;
                      box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-header { margin-bottom: 28px; }
        .login-header h1 { font-size: 22px; color: #1a1a2e; display: flex; align-items: center; gap: 10px; }
        .login-header .tag { background: #4f46e5; color: #fff; font-size: 11px; font-weight: 700;
                              padding: 3px 9px; border-radius: 12px; letter-spacing: 0.5px; }
        .login-header p { color: #6b7280; font-size: 13px; margin-top: 6px; }
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #374151; }
        .field input { width: 100%; padding: 12px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
        .field input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
        button { width: 100%; padding: 12px; background: #4f46e5; color: #fff; border: none;
                 border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 10px; }
        button:hover { background: #4338ca; }
        .error { background: #fee2e2; color: #991b1b; padding: 10px 14px; border-radius: 8px;
                 margin-bottom: 16px; font-size: 14px; }
        .divider { border: none; border-top: 1px solid #f3f4f6; margin: 24px 0 20px; }
        .info-box { background: #f0f7ff; border: 1px solid #bfdbfe; border-radius: 8px;
                    padding: 12px 14px; font-size: 12px; color: #1e40af; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h1>🏢 Bot SDR <span class="tag">PJ</span></h1>
            <p>Painel administrativo — Treinamentos Corporativos</p>
        </div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/admin/login">
            <div class="field">
                <label>Usuário</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="field">
                <label>Senha</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">Entrar</button>
        </form>
        <hr class="divider">
        <div class="info-box">
            🔒 Área restrita ao time de Treinamentos e Comercial PJ.
        </div>
    </div>
</body>
</html>
