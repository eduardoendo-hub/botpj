# ──────────────────────────────────────────────────────────────────────────────
#  NGINX — Bot SDR PJ (porta 8001)
#  Arquivo: /etc/nginx/sites-available/bot-sdr-pj
#
#  Subdomínio sugerido: bot-pj.seudominio.com.br
#  Ou pode usar path-based routing no mesmo domínio do BOT MBA
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name bot-pj.seudominio.com.br;

    # Redireciona HTTP → HTTPS (remover se não usar SSL)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name bot-pj.seudominio.com.br;

    # Certificados SSL (usar certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/bot-pj.seudominio.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot-pj.seudominio.com.br/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Proxy para o Bot SDR PJ (porta 8001)
    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
    }
}

# ──────────────────────────────────────────────────────────────────────────────
#  ALTERNATIVA: Path-based no mesmo servidor do BOT MBA
#  Se preferir usar o mesmo domínio com path /pj/
#  Adicionar dentro do server block do BOT MBA:
#
#   location /webhook/tallospj {
#       proxy_pass http://127.0.0.1:8001;
#       proxy_set_header Host $host;
#       proxy_set_header X-Real-IP $remote_addr;
#   }
#
#  IMPORTANTE: O webhook geral /webhook/tallos já está no BOT MBA (porta 8000)
#  e ele encaminha internamente as mensagens de leads PJ para a porta 8001.
#  Portanto, o RD Conversas só precisa de um único webhook:
#    http://204.168.224.108/webhook/tallos   (BOT MBA → porta 8000)
#
#  O BOT MBA detecta leads PJ e encaminha para: http://127.0.0.1:8001/webhook/tallos
# ──────────────────────────────────────────────────────────────────────────────
