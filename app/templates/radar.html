<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radar · Bot SDR PJ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  #root { min-height: 100vh; }
  @keyframes slideIn { from { transform: translateX(100%) } to { transform: translateX(0) } }
  .animate-slide-in { animation: slideIn .22s cubic-bezier(.16,1,.3,1); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .animate-pulse { animation: pulse 2s cubic-bezier(.4,0,.6,1) infinite; }
  .truncate { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
</style>
</head>
<body class="bg-slate-50">
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect, useCallback } = React;

// ── Lucide icons via UMD ──────────────────────────────────────────────────────
const Icon = ({ name, size = 16, className = "" }) => {
  const el = React.useRef(null);
  useEffect(() => {
    if (el.current && window.lucide) {
      el.current.innerHTML = "";
      const svg = window.lucide.createElement(name);
      if (svg) {
        svg.setAttribute("width", size);
        svg.setAttribute("height", size);
        svg.setAttribute("stroke-width", "1.8");
        if (className) svg.setAttribute("class", className);
        el.current.appendChild(svg);
      }
    }
  }, [name, size, className]);
  return <span ref={el} className="inline-flex items-center justify-center" style={{lineHeight:0}} />;
};

// ── Helpers ───────────────────────────────────────────────────────────────────
const getTempConfig = (temp) => ({
  quente: { label: "Quente", cls: "bg-red-50 text-red-600 border-red-200" },
  morno:  { label: "Morno",  cls: "bg-amber-50 text-amber-600 border-amber-200" },
  frio:   { label: "Frio",   cls: "bg-blue-50 text-blue-600 border-blue-200" },
}[temp] || { label: temp || "—", cls: "bg-gray-100 text-gray-500" });

const getTempIcon = (temp) => ({ quente:"flame", morno:"wind", frio:"snowflake" }[temp] || "help-circle");

const getStatusCls = (s) => ({
  "Novo":                  "bg-slate-100 text-slate-600",
  "Em qualificação":       "bg-violet-50 text-violet-600",
  "Aguardando lead":       "bg-yellow-50 text-yellow-700",
  "Transferido":           "bg-orange-50 text-orange-600",
  "Em atendimento humano": "bg-blue-50 text-blue-700",
  "Qualificado":           "bg-emerald-50 text-emerald-700",
  "Concluído":             "bg-green-50 text-green-700",
  "Perdido":               "bg-red-50 text-red-500",
}[s] || "bg-gray-100 text-gray-500");

const getTipoCls = (t) => ({
  "Turma Aberta":"bg-sky-50 text-sky-700",
  "In Company":"bg-purple-50 text-purple-700",
  "Customizado":"bg-pink-50 text-pink-700",
  "Locação":"bg-teal-50 text-teal-700",
  "Não definido":"bg-gray-100 text-gray-500",
}[t] || "bg-indigo-50 text-indigo-700");

const getFormatoCls = (f) => ({
  "Presencial":"bg-green-50 text-green-700",
  "Online":"bg-blue-50 text-blue-600",
  "Híbrido":"bg-purple-50 text-purple-700",
}[f] || "bg-gray-100 text-gray-500");

const scoreColor = (s) => s>=80?"text-emerald-600":s>=60?"text-amber-600":s>=40?"text-orange-500":"text-red-500";
const scoreBg    = (s) => s>=80?"bg-emerald-500":s>=60?"bg-amber-400":s>=40?"bg-orange-400":"bg-red-400";

const slaConfig = (m) => {
  if (m<=10) return { cls:"text-emerald-700", bg:"bg-emerald-50", label:`${m}m` };
  if (m<=25) return { cls:"text-amber-700",   bg:"bg-amber-50",   label:`${m}m` };
  return           { cls:"text-red-700",     bg:"bg-red-50",     label:`${m}m ⚠` };
};

const quemConfig = (q) => ({
  bot:         { icon:"bot",          label:"Bot SDR",           cls:"text-violet-500 bg-violet-50" },
  transferido: { icon:"arrow-up-right",label:"Aguard. Consultor",cls:"text-orange-500 bg-orange-50" },
  consultor:   { icon:"user",          label:"Consultor",         cls:"text-blue-600 bg-blue-50" },
}[q] || { icon:"help-circle", label:"—", cls:"text-gray-400 bg-gray-100" });

// ── Components ────────────────────────────────────────────────────────────────
const Badge = ({ children, className="" }) => (
  <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium ${className}`}>
    {children}
  </span>
);

const KpiCard = ({ iconName, label, value, color="text-slate-700", urgent=false }) => (
  <div className={`bg-white rounded-xl px-4 py-3 flex items-center gap-3 shadow-sm border ${urgent?"border-red-200 bg-red-50/60":"border-slate-100"}`}>
    <div className={`flex-shrink-0 w-9 h-9 rounded-lg flex items-center justify-center ${urgent?"bg-red-100 text-red-500":"bg-slate-100 text-slate-500"}`}>
      <Icon name={iconName} size={16} />
    </div>
    <div>
      <div className={`text-xl font-bold leading-none ${urgent?"text-red-600":color}`}>{value}</div>
      <div className="text-xs text-slate-400 mt-0.5 whitespace-nowrap">{label}</div>
    </div>
  </div>
);

const QuemIcon = ({ quem }) => {
  const cfg = quemConfig(quem);
  return (
    <div className="relative group flex items-center justify-center">
      <span className={`flex items-center justify-center w-7 h-7 rounded-full ${cfg.cls}`}>
        <Icon name={cfg.icon} size={13} />
      </span>
      <div className="absolute bottom-full mb-1 left-1/2 -translate-x-1/2 z-20 whitespace-nowrap bg-gray-900 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
        {cfg.label}
      </div>
    </div>
  );
};

// ── Drawer ────────────────────────────────────────────────────────────────────
const Drawer = ({ lead, onClose }) => {
  if (!lead) return null;
  const temp = getTempConfig(lead.temp);
  const sla  = slaConfig(lead.sla_min);

  return (
    <div className="fixed inset-0 z-50 flex justify-end">
      <div className="absolute inset-0 bg-black/25 backdrop-blur-sm" onClick={onClose} />
      <div className="animate-slide-in relative w-full max-w-md bg-white shadow-2xl flex flex-col h-full overflow-y-auto">
        {/* Header */}
        <div className="flex items-start justify-between p-5 border-b border-slate-100 sticky top-0 bg-white z-10">
          <div>
            <div className="flex items-center gap-2 flex-wrap">
              <h2 className="font-bold text-slate-800">{lead.nome}</h2>
            </div>
            <div className="text-sm text-slate-400 mt-0.5 flex items-center gap-1.5">
              <Icon name="building-2" size={12} />{lead.empresa}
            </div>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-700 p-1.5 rounded-lg hover:bg-slate-100 transition-colors">
            <Icon name="x" size={17} />
          </button>
        </div>

        <div className="p-5 space-y-5">
          {/* Chips */}
          <div className="flex flex-wrap gap-2">
            <Badge className={`${temp.cls} border`}>
              <Icon name={getTempIcon(lead.temp)} size={10} />{temp.label}
            </Badge>
            <Badge className={getStatusCls(lead.status)}>{lead.status}</Badge>
            <Badge className={`${sla.bg} ${sla.cls}`}>
              <Icon name="clock" size={10} />{sla.label}
            </Badge>
            {lead.trail && lead.trail !== "?" && (
              <Badge className="bg-indigo-50 text-indigo-700">Trail {lead.trail}</Badge>
            )}
            <Badge className={`${scoreColor(lead.score)} bg-slate-50 font-bold`}>
              Score {lead.score}
            </Badge>
          </div>

          {/* Próximo passo */}
          {lead.proximo_passo && lead.proximo_passo !== "—" && (
            <div className="bg-amber-50 border border-amber-100 rounded-xl p-4">
              <div className="flex items-center gap-1.5 text-amber-700 font-semibold text-xs mb-1">
                <Icon name="check-circle" size={12} /> Próximo Passo
              </div>
              <p className="text-sm text-amber-800 font-medium">{lead.proximo_passo}</p>
            </div>
          )}

          {/* Urgência */}
          {lead.urgencia && (
            <div className="bg-red-50 border border-red-100 rounded-xl p-3">
              <div className="flex items-center gap-1.5 text-red-600 font-semibold text-xs mb-1">
                <Icon name="alert-circle" size={12} /> Urgência
              </div>
              <p className="text-sm text-red-700">{lead.urgencia}</p>
            </div>
          )}

          {/* Dados */}
          <div>
            <h3 className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-3">Dados Capturados</h3>
            <div className="grid grid-cols-2 gap-2">
              {[
                ["Telefone", lead.telefone], ["Canal", lead.canal],
                ["Tema", lead.tema],         ["Tipo", lead.tipo],
                ["Formato", lead.formato],   ["Qtd.", lead.qtd || "—"],
                ["Cidade", lead.cidade],     ["Cargo", lead.cargo],
                ["Email", lead.email],       ["Prazo", lead.prazo],
                ["Objetivo", lead.objetivo],
              ].filter(([,v]) => v && v !== "—").map(([k,v]) => (
                <div key={k} className="bg-slate-50 rounded-lg p-2.5">
                  <div className="text-xs text-slate-400">{k}</div>
                  <div className="font-medium text-slate-700 text-xs mt-0.5 truncate" title={v}>{v}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ── Main Radar ────────────────────────────────────────────────────────────────
function Radar() {
  const [leads, setLeads]       = useState([]);
  const [loading, setLoading]   = useState(true);
  const [search, setSearch]     = useState("");
  const [selected, setSelected] = useState(null);
  const [sortCol, setSortCol]   = useState("hora");
  const [sortDir, setSortDir]   = useState("desc");
  const [filters, setFilters]   = useState({ temp:"", quem:"", score:"" });
  const [lastUpd, setLastUpd]   = useState(null);

  const fetchData = useCallback(async () => {
    try {
      // URL relativa ao path atual — funciona tanto direto na porta 8001
      // quanto via nginx com prefixo /pj (ex: /pj/radar → /pj/radar/data)
      const basePath = window.location.pathname.replace(/\/+$/, "");
      const res  = await fetch(basePath + "/data");
      const json = await res.json();
      setLeads(json.leads || []);
      setLastUpd(new Date().toLocaleTimeString("pt-BR", {hour:"2-digit",minute:"2-digit"}));
    } catch(e) {
      console.error("Radar fetch error:", e);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => {
    fetchData();
    const id = setInterval(fetchData, 30000); // atualiza a cada 30s
    return () => clearInterval(id);
  }, [fetchData]);

  const kpis = useMemo(() => ({
    total:       leads.length,
    quentes:     leads.filter(l => l.temp === "quente").length,
    bot:         leads.filter(l => l.quem === "bot").length,
    transferido: leads.filter(l => l.quem === "transferido").length,
    humano:      leads.filter(l => l.quem === "consultor").length,
    parados:     leads.filter(l => l.sla_min > 25).length,
    qualificado: leads.filter(l => l.status === "Qualificado").length,
    locacao:     leads.filter(l => l.tipo === "Locação").length,
  }), [leads]);

  const handleSort = (col) => {
    if (sortCol === col) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortCol(col); setSortDir("desc"); }
  };

  const setFilter = (key, val) =>
    setFilters(f => ({ ...f, [key]: f[key] === val ? "" : val }));

  const filtered = useMemo(() => {
    let data = [...leads];
    if (search) {
      const q = search.toLowerCase();
      data = data.filter(l =>
        (l.nome||"").toLowerCase().includes(q) ||
        (l.empresa||"").toLowerCase().includes(q) ||
        (l.telefone||"").includes(q)
      );
    }
    if (filters.temp)  data = data.filter(l => l.temp === filters.temp);
    if (filters.quem)  data = data.filter(l => l.quem === filters.quem);
    if (filters.score === "alto")  data = data.filter(l => l.score >= 70);
    if (filters.score === "baixo") data = data.filter(l => l.score < 50);

    return [...data].sort((a,b) => {
      let av = a[sortCol] ?? "", bv = b[sortCol] ?? "";
      if (typeof av === "string") { av = av.toLowerCase(); bv = bv.toLowerCase(); }
      if (av < bv) return sortDir==="asc"?-1:1;
      if (av > bv) return sortDir==="asc"?1:-1;
      return 0;
    });
  }, [leads, search, filters, sortCol, sortDir]);

  const activeFilters = Object.values(filters).filter(Boolean).length;

  const Th = ({ col, children }) => (
    <th onClick={() => col && handleSort(col)}
      className={`px-3 py-3 text-left text-xs font-semibold text-slate-400 uppercase tracking-wide whitespace-nowrap select-none ${col?"cursor-pointer hover:text-slate-600":""}`}>
      <span className="flex items-center gap-0.5">
        {children}
        {col && sortCol === col && (
          <Icon name={sortDir==="asc"?"chevron-up":"chevron-down"} size={11} className="text-indigo-500" />
        )}
        {col && sortCol !== col && (
          <Icon name="chevron-down" size={11} className="text-slate-300" />
        )}
      </span>
    </th>
  );

  return (
    <div className="min-h-screen bg-slate-50 font-sans text-slate-900">
      {/* Header */}
      <header className="bg-white border-b border-slate-100 px-6 py-4 sticky top-0 z-30 shadow-sm">
        <div className="flex items-center justify-between gap-4 flex-wrap">
          <div>
            <div className="flex items-center gap-2">
              <div className="w-7 h-7 bg-indigo-600 rounded-lg flex items-center justify-center shadow-sm">
                <Icon name="bar-chart-2" size={14} className="text-white" />
              </div>
              <h1 className="text-lg font-bold text-slate-800 tracking-tight">Radar</h1>
              <span className="flex items-center gap-1.5 bg-emerald-50 text-emerald-600 text-xs font-semibold px-2.5 py-1 rounded-full border border-emerald-100">
                <span className="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse inline-block" />
                Ao Vivo
              </span>
            </div>
            <p className="text-xs text-slate-400 mt-0.5 ml-9">Monitoramento em tempo real · Leads PJ · Treinamentos Corporativos</p>
          </div>
          <div className="flex items-center gap-2">
            {lastUpd && <span className="text-xs text-slate-400">Atualizado {lastUpd}</span>}
            <div className="relative">
              <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                <Icon name="search" size={13} />
              </span>
              <input value={search} onChange={e => setSearch(e.target.value)}
                placeholder="Nome, empresa ou telefone…"
                className="pl-8 pr-3 py-2 text-sm border border-slate-200 rounded-lg bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:bg-white w-60 transition-all" />
            </div>
            <button onClick={fetchData}
              className="flex items-center gap-1.5 text-xs text-indigo-600 bg-indigo-50 border border-indigo-100 px-3 py-2 rounded-lg hover:bg-indigo-100 transition-colors font-semibold">
              <Icon name="refresh-cw" size={13} /> Atualizar
            </button>
            <a href={window.location.pathname.replace(/\/radar.*$/, "/admin")} className="flex items-center gap-1.5 text-xs text-slate-500 bg-white border border-slate-200 px-3 py-2 rounded-lg hover:bg-slate-50 transition-colors">
              <Icon name="settings" size={13} /> Admin
            </a>
            <a href={window.location.pathname.replace(/\/radar.*$/, "/radar/logout")} className="flex items-center gap-1.5 text-xs text-slate-500 bg-white border border-slate-200 px-3 py-2 rounded-lg hover:bg-slate-50 transition-colors">
              <Icon name="log-out" size={13} /> Sair
            </a>
          </div>
        </div>
      </header>

      <div className="px-6 py-5 space-y-4">
        {/* KPIs */}
        <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-8 gap-3">
          <KpiCard iconName="users"          label="Leads hoje"    value={kpis.total}       color="text-indigo-600" />
          <KpiCard iconName="flame"          label="Quentes"       value={kpis.quentes}     color="text-red-500" />
          <KpiCard iconName="bot"            label="Com o bot"     value={kpis.bot}         color="text-violet-600" />
          <KpiCard iconName="arrow-up-right" label="Transferidos"  value={kpis.transferido} color="text-orange-500" />
          <KpiCard iconName="phone-call"     label="Com consultor" value={kpis.humano}      color="text-blue-600" />
          <KpiCard iconName="alert-circle"   label="SLA crítico"   value={kpis.parados}     urgent={kpis.parados > 0} />
          <KpiCard iconName="check-circle"   label="Qualificados"  value={kpis.qualificado} color="text-emerald-600" />
          <KpiCard iconName="building-2"     label="Locação"       value={kpis.locacao}     color="text-teal-600" />
        </div>

        {/* Filtros */}
        <div className="bg-white rounded-xl border border-slate-100 px-4 py-3 shadow-sm">
          <div className="flex items-center gap-3 flex-wrap">
            <span className="flex items-center gap-1.5 text-xs text-slate-400 font-medium">
              <Icon name="filter" size={12} /> Filtros
              {activeFilters > 0 && (
                <span className="w-4 h-4 bg-indigo-500 text-white rounded-full text-xs font-bold flex items-center justify-center">{activeFilters}</span>
              )}
            </span>
            <div className="w-px h-4 bg-slate-200" />

            {["quente","morno","frio"].map(t => {
              const cfg = getTempConfig(t);
              const on  = filters.temp === t;
              return (
                <button key={t} onClick={() => setFilter("temp", t)}
                  className={`flex items-center gap-1 px-2.5 py-1.5 rounded-lg text-xs font-medium border transition-all ${on?`${cfg.cls} border-current shadow-sm`:"bg-white text-slate-500 border-slate-200 hover:border-slate-300"}`}>
                  <Icon name={getTempIcon(t)} size={11} />{cfg.label}
                </button>
              );
            })}

            <div className="w-px h-4 bg-slate-200" />

            {[["bot","Bot"],["transferido","Transferido"],["consultor","Consultor"]].map(([v,l]) => (
              <button key={v} onClick={() => setFilter("quem", v)}
                className={`px-2.5 py-1.5 rounded-lg text-xs font-medium border transition-all ${filters.quem===v?"bg-indigo-50 text-indigo-700 border-indigo-200 shadow-sm":"bg-white text-slate-500 border-slate-200 hover:border-slate-300"}`}>
                {l}
              </button>
            ))}

            <div className="w-px h-4 bg-slate-200" />

            {[["alto","Score 70+"],["baixo","Score <50"]].map(([v,l]) => (
              <button key={v} onClick={() => setFilter("score", v)}
                className={`px-2.5 py-1.5 rounded-lg text-xs font-medium border transition-all ${filters.score===v?"bg-slate-800 text-white border-slate-800 shadow-sm":"bg-white text-slate-500 border-slate-200 hover:border-slate-300"}`}>
                {l}
              </button>
            ))}

            {activeFilters > 0 && (
              <button onClick={() => setFilters({temp:"",quem:"",score:""})}
                className="ml-auto flex items-center gap-1 text-xs text-slate-400 hover:text-slate-600 transition-colors">
                <Icon name="x" size={11} /> Limpar
              </button>
            )}
          </div>
        </div>

        {/* Tabela */}
        <div className="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden">
          <div className="flex items-center justify-between px-4 py-3 border-b border-slate-100">
            <span className="text-sm font-semibold text-slate-600">
              {loading ? "Carregando…" : `${filtered.length} lead${filtered.length!==1?"s":""}`}
              {!loading && activeFilters > 0 && <span className="text-slate-400 font-normal"> filtrados</span>}
            </span>
            <span className="text-xs text-slate-400">Clique em uma linha para ver detalhes</span>
          </div>

          <div className="overflow-x-auto">
            <table className="w-full">
              <thead className="bg-slate-50/80 border-b border-slate-100">
                <tr>
                  <Th col="hora">Hora</Th>
                  <Th>Nome / Empresa</Th>
                  <Th>Telefone</Th>
                  <Th>Tema</Th>
                  <Th>Tipo</Th>
                  <Th>Formato</Th>
                  <Th col="temp">Temp.</Th>
                  <Th col="score">Score</Th>
                  <Th>Status</Th>
                  <Th>Próximo Passo</Th>
                  <Th col="quem">Quem</Th>
                  <Th col="sla_min">SLA</Th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-50">
                {loading ? (
                  <tr><td colSpan={12} className="py-14 text-center text-slate-400 text-sm">Carregando leads…</td></tr>
                ) : filtered.length === 0 ? (
                  <tr>
                    <td colSpan={12} className="py-14 text-center">
                      <div className="flex justify-center mb-2"><Icon name="message-square" size={28} className="text-slate-300" /></div>
                      <p className="text-sm text-slate-400">Nenhum lead encontrado.</p>
                    </td>
                  </tr>
                ) : filtered.map(lead => {
                  const temp = getTempConfig(lead.temp);
                  const sla  = slaConfig(lead.sla_min);
                  return (
                    <tr key={lead.id} onClick={() => setSelected(lead)}
                      className={`cursor-pointer transition-colors hover:bg-indigo-50/40 ${lead.sla_min>25?"bg-red-50/20":""} ${selected?.id===lead.id?"bg-indigo-50/60":""}`}>
                      <td className="px-3 py-3.5">
                        <span className="font-mono text-xs text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded">{lead.hora}</span>
                      </td>
                      <td className="px-3 py-3.5 min-w-[160px]">
                        <div className="font-semibold text-slate-800 text-sm truncate max-w-[150px]" title={lead.nome}>{lead.nome}</div>
                        <div className="text-xs text-slate-400 mt-0.5 flex items-center gap-1 truncate max-w-[150px]">
                          <Icon name="building-2" size={10} />{lead.empresa}
                        </div>
                      </td>
                      <td className="px-3 py-3.5">
                        <span className="font-mono text-xs text-slate-500">{lead.telefone}</span>
                      </td>
                      <td className="px-3 py-3.5 max-w-[130px]">
                        <span className="text-xs text-slate-700 font-medium truncate block" title={lead.tema}>{lead.tema}</span>
                      </td>
                      <td className="px-3 py-3.5">
                        <Badge className={getTipoCls(lead.tipo)}>{lead.tipo}</Badge>
                      </td>
                      <td className="px-3 py-3.5">
                        <Badge className={getFormatoCls(lead.formato)}>{lead.formato}</Badge>
                      </td>
                      <td className="px-3 py-3.5">
                        <Badge className={`${temp.cls} border`}>
                          <Icon name={getTempIcon(lead.temp)} size={10} />{temp.label}
                        </Badge>
                      </td>
                      <td className="px-3 py-3.5">
                        <div className="flex items-center gap-1.5">
                          <span className={`text-sm font-bold tabular-nums ${scoreColor(lead.score)}`}>{lead.score}</span>
                          <div className="w-8 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                            <div className={`h-full rounded-full ${scoreBg(lead.score)}`} style={{width:`${lead.score}%`}} />
                          </div>
                        </div>
                      </td>
                      <td className="px-3 py-3.5 whitespace-nowrap">
                        <Badge className={getStatusCls(lead.status)}>{lead.status}</Badge>
                      </td>
                      <td className="px-3 py-3.5 max-w-[160px]">
                        <span className="text-xs text-slate-600 truncate block" title={lead.proximo_passo}>{lead.proximo_passo}</span>
                      </td>
                      <td className="px-3 py-3.5">
                        <QuemIcon quem={lead.quem} />
                      </td>
                      <td className="px-3 py-3.5 whitespace-nowrap">
                        <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold ${sla.bg} ${sla.cls}`}>
                          <Icon name="clock" size={10} />{sla.label}
                        </span>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {!loading && filtered.length > 0 && (
            <div className="px-4 py-2.5 border-t border-slate-100 flex items-center justify-between">
              <span className="text-xs text-slate-400">Auto-atualiza a cada 30s</span>
              <span className="text-xs text-slate-400">
                {filtered.filter(l=>l.temp==="quente").length} quentes ·{" "}
                {filtered.filter(l=>l.sla_min>25).length} SLA crítico
              </span>
            </div>
          )}
        </div>
      </div>

      {selected && <Drawer lead={selected} onClose={() => setSelected(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Radar />);
</script>
</body>
</html>
